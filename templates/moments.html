                const aiPostSection = document.getElementById('aiPostSection');
                const forceAiPostCancel = document.getElementById('forceAiPostCancel');
                const momentComposeTransRow = document.getElementById('momentComposeTransRow');

                if (!composeBtn || !composeText || !openBtn || !mask || !cancelBtn) return;

                // 按钮切换
                if (showUserPostBtn && showAiPostBtn) {
                    showUserPostBtn.addEventListener('click', () => {
                        userPostSection.style.display = 'block';
                        aiPostSection.style.display = 'none';
                        showUserPostBtn.style.background = 'var(--primary-color)';
                        showUserPostBtn.style.color = 'white';
                        showAiPostBtn.style.background = '#f0f2f5';
                        showAiPostBtn.style.color = 'var(--text-main)';
                    });
                    showAiPostBtn.addEventListener('click', () => {
                        userPostSection.style.display = 'none';
                        aiPostSection.style.display = 'block';
                        showAiPostBtn.style.background = 'var(--primary-color)';
                        showAiPostBtn.style.color = 'white';
                        showUserPostBtn.style.background = '#f0f2f5';
                        showUserPostBtn.style.color = 'var(--text-main)';
                        
                        // 切换到“让角色发”时，自动加载角色列表（如果还没加载）
                        const forceCharacterSelect = document.getElementById('forceMomentCharacterSelect');
                        if (forceCharacterSelect && forceCharacterSelect.options.length <= 1) {
                            fetch('/api/moments/characters')
                                .then(r => r.json())
                                .then(remarks => {
                                    let html = '<option value="">(选择一个角色)</option>';
                                    for (const cid in remarks) {
                                        html += `<option value="${cid}">${remarks[cid]}</option>`;
                                    }
                                    forceCharacterSelect.innerHTML = html;
                                });
                        }
                    });
                }

                // 更新朋友圈字数显示
                function updateCharCount() {
                    if (!charCountEl) return;
                    const length = composeText.value.length;
                    const maxLength = 1000;
                    charCountEl.textContent = length + '/' + maxLength;
                    if (length >= maxLength) {
                        composeText.classList.add('is-full');
                        charCountEl.classList.add('is-full');
                    } else {
                        composeText.classList.remove('is-full');
                        charCountEl.classList.remove('is-full');
                    }
                }

                composeText.addEventListener('input', updateCharCount);

                function openModal() {
                    mask.style.display = 'flex';
                    // 默认显示我自己发
                    if (showUserPostBtn) showUserPostBtn.click();
                    // 检查翻译框
                    if (momentComposeTransRow) {
                        if (window.AI_LANG === 'ja') {
                            momentComposeTransRow.style.display = 'flex';
                        } else {
                            momentComposeTransRow.style.display = 'none';
                        }
                    }
                    setTimeout(() => composeText.focus(), 0);
                    updateCharCount();
                }
                function closeModal() {
                    mask.style.display = 'none';
                    composeBtn.disabled = false;
                    composeBtn.classList.remove('is-loading');
                    composeBtn.innerHTML = '发布';
                }

                const forceMomentModalSubmit = document.getElementById('forceMomentModalSubmit');
                if (forceMomentModalSubmit) {
                    forceMomentModalSubmit.addEventListener('click', function() {
                        const forceCharacterSelect = document.getElementById('forceMomentCharacterSelect');
                        const char_id = forceCharacterSelect.value;
                        if (!char_id) {
                            alert("请选择要催发动态的角色");
                            return;
                        }

                        forceMomentModalSubmit.disabled = true;
                        const oldText = forceMomentModalSubmit.innerHTML;
                        forceMomentModalSubmit.innerHTML = '<span class="moment-compose-spinner"></span>生成中…';

                        fetch('/api/moments/force_active', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    char_id: char_id
                                })
                            })
                            .then(r => r.json())
                            .then(data => {
                                if (data.status === 'success') {
                                    closeModal();
                                    loadNextPage(true, {
                                        highlightFirst: true
                                    });
                                } else {
                                    alert("生成失败: " + (data.error || "未知原因"));
                                }
                            })
                            .catch(err => alert("网络错误: " + err))
                            .finally(() => {
                                forceMomentModalSubmit.disabled = false;
                                forceMomentModalSubmit.innerHTML = oldText;
                            });
                    });
                }

                openBtn.addEventListener('click', openModal);
                cancelBtn.addEventListener('click', function() {
                    composeText.value = '';
                    if (composeTransText) composeTransText.value = '';
                    if (charCountEl) {
                        charCountEl.textContent = '0/1000';
                        charCountEl.classList.remove('is-full');
                    }
                    composeText.classList.remove('is-full');
                    closeModal();
                });
                if (forceAiPostCancel) {
                    forceAiPostCancel.addEventListener('click', closeModal);
                }
                // 点击遮罩空白处关闭
                mask.addEventListener('mousedown', function(e) {
                    if (e.target === mask) {
                        closeModal();
                    }
                });

                if (composeTransBtn && composeTransText) {
                    composeTransBtn.addEventListener('click', function() {
                        const txt = (composeTransText.value || '').trim();
                        if (!txt) return;
                        composeTransBtn.disabled = true;
                        composeTransBtn.textContent = '翻译中…';
                        requestTranslation(txt, '', 'zh_to_ja', null)
                            .then((res) => {
                                composeText.value = res;
                                composeTransText.value = '';
                            })
                            .catch(() => {})
                            .finally(() => {
                                composeTransBtn.disabled = false;
                                composeTransBtn.textContent = '翻译';
                            });
                    });
                }

                composeBtn.addEventListener('click', function() {
                    const content = (composeText.value || '').trim();
                    if (!content) return;
                    composeBtn.disabled = true;
                    composeBtn.classList.add('is-loading');
                    composeBtn.innerHTML = '<span class="moment-compose-spinner"></span>发布中…';
                    fetch('/api/moments/post', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: content })
                    })
                        .then(r => r.json())
                        .then(() => {
                            composeText.value = '';
                            if (charCountEl) {
                                charCountEl.textContent = '0/1000';
                                charCountEl.classList.remove('is-full');
                            }
                            composeText.classList.remove('is-full');
                            closeModal();
                            loadNextPage(true, { highlightFirst: true });
                        })
                        .catch(() => {})
                        .finally(() => {
                            composeBtn.disabled = false;
                            composeBtn.classList.remove('is-loading');
                            composeBtn.innerHTML = '发布';
                        });
                });
                
                // ===== 编辑弹窗事件处理 =====
                const editModalMask = document.getElementById('editModalMask');
                const editModal = document.getElementById('editModal');
                const editModalTextarea = document.getElementById('editModalTextarea');
                const editModalCancel = document.getElementById('editModalCancel');
                const editModalSubmit = document.getElementById('editModalSubmit');
                const editCharCount = document.getElementById('editCharCount');
                
                if (!editModalMask || !editModalTextarea) return;
                
                // 更新编辑框字数显示
                window.updateEditCharCount = function() {
                    if (!editCharCount) return;
                    const length = editModalTextarea.value.length;
                    const maxLength = editModalTextarea.maxLength || 1000;
                    editCharCount.textContent = length + '/' + maxLength;
                    if (length >= maxLength) {
                        editModalTextarea.classList.add('is-full');
                        editCharCount.classList.add('is-full');
                    } else {
                        editModalTextarea.classList.remove('is-full');
                        editCharCount.classList.remove('is-full');
                    }
                }
                
                editModalTextarea.addEventListener('input', updateEditCharCount);
                
                // 关闭编辑弹窗
                function closeEditModal() {
                    editModalMask.style.display = 'none';
                    editModalSubmit.disabled = false;
                    editModalSubmit.classList.remove('is-loading');
                    editModalSubmit.innerHTML = '保存';
                }
                
                editModalCancel.addEventListener('click', function() {
                    closeEditModal();
                });
                
                // 点击遮罩空白处关闭
                editModalMask.addEventListener('click', function(e) {
                    if (e.target === editModalMask) {
                        closeEditModal();
                    }
                });
                
                // 提交编辑
                editModalSubmit.addEventListener('click', function() {
                    const newContent = (editModalTextarea.value || '').trim();
                    const originalContent = (editModalMask.dataset.originalContent || '').trim();
                    
                    if (!newContent) {
                        alert('内容不能为空');
                        return;
                    }
                    if (newContent === originalContent) {
                        alert('内容未修改');
                        return;
                    }
                    
                    const editType = editModalMask.dataset.editType;
                    const charId = editModalMask.dataset.charId;
                    const timestamp = editModalMask.dataset.timestamp;
                    
                    editModalSubmit.disabled = true;
                    editModalSubmit.classList.add('is-loading');
                    editModalSubmit.innerHTML = '<span class="moment-compose-spinner"></span>保存中…';
                    
                    if (editType === 'moment') {
                        // 编辑朋友圈
                        fetch('/api/moments/edit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ char_id: charId, timestamp: timestamp, new_content: newContent })
                        })
                            .then(r => r.json())
                            .then(() => {
                                closeEditModal();
                                reloadAndScrollTo({ char_id: charId, timestamp: timestamp });
                            })
                            .catch(err => {
                                alert('保存失败: ' + err);
                            })
                            .finally(() => {
                                editModalSubmit.disabled = false;
                                editModalSubmit.classList.remove('is-loading');
                                editModalSubmit.innerHTML = '保存';
                            });
                    } else if (editType === 'comment') {
                        // 编辑评论
                        const commentIndex = parseInt(editModalMask.dataset.commentIndex, 10);
                        fetch('/api/moments/comment/edit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ char_id: charId, timestamp: timestamp, comment_index: commentIndex, new_content: newContent })
                        })
                            .then(r => r.json())
                            .then(() => {
                                closeEditModal();
                                reloadAndScrollTo({ char_id: charId, timestamp: timestamp });
                            })
                            .catch(err => {
                                alert('保存失败: ' + err);
                            })
                            .finally(() => {
                                editModalSubmit.disabled = false;
                                editModalSubmit.classList.remove('is-loading');
                                editModalSubmit.innerHTML = '保存';
                            });
                    }
                });

                // --- 新增：@ 自动补齐逻辑 ---
                const atMenuId = 'atMentionMenu';
                const atMenu = document.getElementById(atMenuId);
                let charListForAt = [];
                let highlightIdx = 0;

                // ====== 回复弹窗相关 ======
                const replyModalMask = document.getElementById('replyModalMask');
                const replyModalCancel = document.getElementById('replyModalCancel');
                const replyModalSubmit = document.getElementById('replyModalSubmit');
                const replyCharacterSelect = document.getElementById('replyCharacterSelect');
                
                // 新增元素
                const showAiReplyBtn = document.getElementById('showAiReplyBtn');
                const showUserReplyBtn = document.getElementById('showUserReplyBtn');
                const aiReplySection = document.getElementById('aiReplySection');
                const userReplySection = document.getElementById('userReplySection');
                const userReplyCancel = document.getElementById('userReplyCancel');
                const userReplySubmit = document.getElementById('userReplySubmit');
                const userReplyTextarea = document.getElementById('userReplyTextarea');
                const userReplyCharCount = document.getElementById('userReplyCharCount');
                const userReplyTransRow = document.getElementById('userReplyTransRow');
                const userReplyTransInput = document.getElementById('userReplyTransInput');
                const userReplyTransBtn = document.getElementById('userReplyTransBtn');

                if (replyModalMask && replyCharacterSelect) {
                    // 初始化角色列表
                    fetch('/api/moments/characters')
                        .then(r => r.json())
                        .then(remarks => {
                            let html = '<option value="">(选择一个角色)</option>';
                            for (const cid in remarks) {
                                html += `<option value="${cid}">${escapeHtml(remarks[cid])}</option>`;
                            }
                            replyCharacterSelect.innerHTML = html;
                        });

                    function closeReplyModal() {
                        replyModalMask.style.display = 'none';
                        replyCharacterSelect.value = '';
                        userReplyTextarea.value = '';
                        if (userReplyCharCount) userReplyCharCount.innerText = '0/200';
                        userReplyTransInput.value = '';
                        replyModalMask.dataset.charId = '';
                        replyModalMask.dataset.timestamp = '';
                        replyModalMask.dataset.commentIndex = '';
                        // 重置到AI选择界面
                        aiReplySection.style.display = 'block';
                        userReplySection.style.display = 'none';
                        
                        // 重置按钮样式
                        showAiReplyBtn.style.background = 'var(--primary-color)';
                        showAiReplyBtn.style.color = 'white';
                        showUserReplyBtn.style.background = '#f0f2f5';
                        showUserReplyBtn.style.color = 'var(--text-main)';
                    }

                    replyModalCancel.addEventListener('click', closeReplyModal);
                    userReplyCancel.addEventListener('click', closeReplyModal);
                    replyModalMask.addEventListener('click', e => {
                        if (e.target === replyModalMask) closeReplyModal();
                    });

                    // 切换回复方式
                    showAiReplyBtn.addEventListener('click', () => {
                        aiReplySection.style.display = 'block';
                        userReplySection.style.display = 'none';
                        showAiReplyBtn.style.background = 'var(--primary-color)';
                        showAiReplyBtn.style.color = 'white';
                        showUserReplyBtn.style.background = '#f0f2f5';
                        showUserReplyBtn.style.color = 'var(--text-main)';
                    });
                    showUserReplyBtn.addEventListener('click', () => {
                        aiReplySection.style.display = 'none';
                        userReplySection.style.display = 'block';
                        showUserReplyBtn.style.background = 'var(--primary-color)';
                        showUserReplyBtn.style.color = 'white';
                        showAiReplyBtn.style.background = '#f0f2f5';
                        showAiReplyBtn.style.color = 'var(--text-main)';
                        // 仅当 AI 设置为日语模式时才显示翻译框
                        if (window.AI_LANG === 'ja') {
                            userReplyTransRow.style.display = 'flex';
                        } else {
                            userReplyTransRow.style.display = 'none';
                        }
                    });

                    // 实时字数统计
                    if (userReplyTextarea && userReplyCharCount) {
                        userReplyTextarea.addEventListener('input', () => {
                            const len = userReplyTextarea.value.length;
                            userReplyCharCount.innerText = `${len}/200`;
                            if (len >= 200) {
                                userReplyCharCount.style.color = '#ff4d4f';
                            } else {
                                userReplyCharCount.style.color = 'var(--text-muted)';
                            }
                        });
                    }

                    // 翻译逻辑
                    if (userReplyTransBtn) {
                        userReplyTransBtn.addEventListener('click', () => {
                            const text = userReplyTransInput.value.trim();
                            if (!text) return;
                            userReplyTransBtn.disabled = true;
                            userReplyTransBtn.innerText = "...";
                            fetch('/api/translate/zh2jp', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ text: text })
                            })
                            .then(r => r.json())
                            .then(data => {
                                if (data.translated) {
                                    userReplyTextarea.value = data.translated;
                                    userReplyTransInput.value = '';
                                    // 翻译后手动触发 input 事件以更新字数
                                    userReplyTextarea.dispatchEvent(new Event('input'));
                                }
                            })
                            .finally(() => {
                                userReplyTransBtn.disabled = false;
                                userReplyTransBtn.innerText = "翻译";
                            });
                        });
                    }

                    // AI 回复发送
                    replyModalSubmit.addEventListener('click', () => {
                        const replying_char_id = replyCharacterSelect.value;
                        if (!replying_char_id) {
                            alert("请选择用于回复的角色");
                            return;
                        }

                        const charId = replyModalMask.dataset.charId;
                        const timestamp = replyModalMask.dataset.timestamp;
                        const commentIndex = replyModalMask.dataset.commentIndex;

                        replyModalSubmit.disabled = true;
                        const oldText = replyModalSubmit.innerHTML;
                        replyModalSubmit.innerHTML = '<span class="moment-compose-spinner"></span>生成中…';

                        let fetchUrl = '';
                        let requestBody = { char_id: charId, timestamp: timestamp };

                        if (commentIndex === '' || commentIndex === null || commentIndex === undefined) {
                            fetchUrl = '/api/moments/post/ai_comment';
                            requestBody.commenter_id = replying_char_id;
                        } else {
                            fetchUrl = '/api/moments/comment/ai_reply';
                            requestBody.comment_index = commentIndex;
                            requestBody.replying_char_id = replying_char_id;
                        }

                        fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(requestBody)
                        })
                        .then(r => r.json())
                        .then(data => {
                            if (data.error) {
                                alert("生成失败: " + data.error);
                            } else {
                                closeReplyModal();
                                reloadAndScrollTo({ char_id: charId, timestamp: timestamp });
                            }
                        })
                        .catch(err => alert("网络错误: " + err))
                        .finally(() => {
                            replyModalSubmit.disabled = false;
                            replyModalSubmit.innerHTML = oldText;
                        });
                    });

                    // 用户亲自回复发送
                    userReplySubmit.addEventListener('click', () => {
                        const content = userReplyTextarea.value.trim();
                        if (!content) {
                            alert("回复内容不能为空");
                            return;
                        }

                        const charId = replyModalMask.dataset.charId;
                        const timestamp = replyModalMask.dataset.timestamp;
                        const commentIndex = replyModalMask.dataset.commentIndex;

                        userReplySubmit.disabled = true;
                        const oldText = userReplySubmit.innerHTML;
                        userReplySubmit.innerHTML = '<span class="moment-compose-spinner"></span>发送中…';

                        let fetchUrl = '';
                        let requestBody = { char_id: charId, timestamp: timestamp, content: content };

                        if (commentIndex === '' || commentIndex === null || commentIndex === undefined) {
                            // 直接回复朋友圈本身（调用原有的 moments_comment）
                            fetchUrl = '/api/moments/comment';
                        } else {
                            // 回复特定的某条评论 (调用新接口)
                            fetchUrl = '/api/moments/comment/user_reply';
                            requestBody.comment_index = commentIndex;
                        }

                        fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(requestBody)
                        })
                        .then(r => r.json())
                        .then(data => {
                            if (data.error) {
                                alert("发送失败: " + data.error);
                            } else {
                                closeReplyModal();
                                reloadAndScrollTo({ char_id: charId, timestamp: timestamp });
                            }
                        })
                        .catch(err => alert("网络错误: " + err))
                        .finally(() => {
                            userReplySubmit.disabled = false;
                            userReplySubmit.innerHTML = oldText;
                        });
                    });
                }

                // 加载角色列表供 @ 使用
                fetch('/api/moments/characters')
                    .then(r => r.json())
                    .then(remarks => {
                        charListForAt = Object.keys(remarks).map(cid => ({ id: cid, name: remarks[cid] }));
                    });

                function updateAtMenu(textarea) {
                    const text = textarea.value;
                    const pos = textarea.selectionStart;
                    if (pos === 0) { atMenu.style.display = 'none'; return; }
                    
                    const before = text.substring(0, pos);
                    const lastAt = before.lastIndexOf('@');
                    
                    if (lastAt !== -1) {
                        const afterAt = before.substring(lastAt + 1);
                        if (!afterAt.includes(' ') && !afterAt.includes('\n')) {
                            const query = afterAt.toLowerCase();
                            const matches = charListForAt.filter(c => c.name.toLowerCase().includes(query) || c.id.toLowerCase().includes(query));
                            
                            if (matches.length > 0) {
                                highlightIdx = Math.min(highlightIdx, matches.length - 1);
                                atMenu.innerHTML = matches.map((c, i) => 
                                    `<div class="at-mention-item ${i === highlightIdx ? 'selected' : ''}" data-name="${c.name}">${c.name}</div>`
                                ).join('');
                                atMenu.style.display = 'block';
                                
                                // 定位在输入文本框上方或下方
                                const rect = textarea.getBoundingClientRect();
                                atMenu.style.left = rect.left + 'px';
                                atMenu.style.width = (rect.width - 2) + 'px';
                                atMenu.style.top = (rect.bottom + 5) + 'px'; 
                                
                                atMenu.onmousedown = (e) => {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    const item = e.target.closest('.at-mention-item');
                                    if (item) {
                                        const textVal = textarea.value;
                                        const startOfAt = textVal.substring(0, textarea.selectionStart).lastIndexOf('@');
                                        insertAt(textarea, item.getAttribute('data-name'), startOfAt);
                                    }
                                };
                                return;
                            }
                        }
                    }
                    atMenu.style.display = 'none';
                    highlightIdx = 0;
                }

                function insertAt(textarea, name, atPos) {
                    const text = textarea.value;
                    const pos = textarea.selectionStart;
                    const before = text.substring(0, atPos);
                    const after = text.substring(pos);
                    textarea.value = before + '@' + name + ' ' + after;
                    const newPos = atPos + name.length + 2;
                    textarea.selectionStart = textarea.selectionEnd = newPos;
                    atMenu.style.display = 'none';
                    textarea.focus();
                    
                    // 确保 updateCharCount 也更新
                    const event = new Event('input', { bubbles: true });
                    textarea.dispatchEvent(event);
                }

                composeText.addEventListener('input', () => updateAtMenu(composeText));
                // 防止在 @ 菜单显示时按回车导致表单提交或弹窗关闭
                composeText.addEventListener('keydown', function(e) {
                    if (atMenu.style.display === 'block') {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            e.stopPropagation();
                            const items = atMenu.querySelectorAll('.at-mention-item');
                            const selected = items[highlightIdx];
                            if (selected) {
                                const before = composeText.value.substring(0, composeText.selectionStart);
                                insertAt(composeText, selected.dataset.name, before.lastIndexOf('@'));
                            }
                            return;
                        }
                        if (e.key === 'ArrowDown') {
                            const items = atMenu.querySelectorAll('.at-mention-item');
                            highlightIdx = (highlightIdx + 1) % items.length;
                            updateAtMenu(composeText);
                            e.preventDefault();
                        } else if (e.key === 'ArrowUp') {
                            const items = atMenu.querySelectorAll('.at-mention-item');
                            highlightIdx = (highlightIdx - 1 + items.length) % items.length;
                            updateAtMenu(composeText);
                            e.preventDefault();
                        } else if (e.key === 'Escape') {
                            atMenu.style.display = 'none';
                            e.preventDefault();
                        }
                    }
                });
            }

            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', function() {
                    loadNextPage(false);
                });
            }

            function initCharFilter() {
                const filterBtn = document.getElementById('charFilterBtn');
                const filterMenu = document.getElementById('charFilterMenu');
                const label = document.getElementById('charFilterLabel');
                if (!filterBtn || !filterMenu) return;

                // 切换菜单显示
                filterBtn.addEventListener('click', function(e) {
                    if (e.target.closest('.char-filter-menu')) return;
                    filterMenu.classList.toggle('show');
                    filterBtn.classList.toggle('is-open');
                });

                // 点击外部关闭菜单
                document.addEventListener('click', function(e) {
                    if (!filterBtn.contains(e.target)) {
                        filterMenu.classList.remove('show');
                        filterBtn.classList.remove('is-open');
                    }
                });

                // 核心筛选逻辑：监听菜单项点击（包括后续注入的角色项）
                filterMenu.addEventListener('click', function(e) {
                    const item = e.target.closest('.char-filter-item');
                    if (!item) return;

                    const charId = item.dataset.charId;
                    const name = item.innerText;

                    // 更新 UI 状态
                    filterMenu.querySelectorAll('.char-filter-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    if (charId === 'all') {
                        label.innerText = '朋友圈';
                    } else {
                        label.innerText = name + '的朋友圈';
                    }

                    // 重新加载数据
                    currentFilterCharId = charId;
                    loadNextPage(true);
                    
                    filterMenu.classList.remove('show');
                    filterBtn.classList.remove('is-open');
                });

                // 注入角色列表
                fetch('/api/moments/characters')
                    .then(r => r.json())
                    .then(remarks => {
                        Object.keys(remarks).forEach(cid => {
                            const name = remarks[cid];
                            const item = document.createElement('div');
                            item.className = 'char-filter-item';
                            item.dataset.charId = cid;
                            item.innerText = name;
                            filterMenu.appendChild(item);
                        });
                    })
                    .catch(() => {});
            }

            function initActiveMomentsToggle() {
                const toggleBtn = document.getElementById('activeMomentsToggle');
                if (!toggleBtn) return;

                function updateToggle(enabled) {
                    toggleBtn.textContent = enabled ? '关闭主动朋友圈' : '开启主动朋友圈';
                    toggleBtn.classList.toggle('is-off', !enabled);
                    toggleBtn.title = enabled ? '角色会定时自动发朋友圈，点击关闭' : '点击开启后角色会定时自动发朋友圈';
                }

                fetch('/api/moments/active_enabled')
                    .then(r => r.json())
                    .then(function(data) {
                        updateToggle(data.enabled !== false);
                    })
                    .catch(function() {
                        updateToggle(true);
                    });

                toggleBtn.addEventListener('click', function() {
                    if (toggleBtn.disabled) return;
                    const nextEnabled = toggleBtn.classList.contains('is-off');
                    toggleBtn.disabled = true;
                    fetch('/api/moments/active_enabled', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled: nextEnabled })
                    })
                        .then(r => r.json())
                        .then(function(data) {
                            updateToggle(data.enabled !== false);
                        })
                        .catch(function() {})
                        .finally(function() {
                            toggleBtn.disabled = false;
                        });
                });
            }

            function initForceMoment() {
                const forceMomentBtn = document.getElementById('forceMomentBtn');
                const forceModalMask = document.getElementById('forceMomentModalMask');
                const forceModalCancel = document.getElementById('forceMomentModalCancel');
                const forceModalSubmit = document.getElementById('forceMomentModalSubmit');
                const forceCharacterSelect = document.getElementById('forceMomentCharacterSelect');

                if (!forceMomentBtn || !forceModalMask) return;

                function closeForceModal() {
                    forceModalMask.style.display = 'none';
                    forceCharacterSelect.value = '';
                }

                forceMomentBtn.addEventListener('click', function() {
                    // Fetch characters
                    fetch('/api/moments/characters')
                        .then(r => r.json())
                        .then(remarks => {
                            let html = '<option value="">(选择一个角色)</option>';
                            for (const cid in remarks) {
                                html += `<option value="${cid}">${escapeHtml(remarks[cid])}</option>`;
                            }
                            forceCharacterSelect.innerHTML = html;
                        });
                    forceModalMask.style.display = 'flex';
                });

                forceModalCancel.addEventListener('click', closeForceModal);
                forceModalMask.addEventListener('click', e => {
                    if (e.target === forceModalMask) closeForceModal();
                });

                forceModalSubmit.addEventListener('click', function() {
                    const char_id = forceCharacterSelect.value;
                    if (!char_id) {
                        alert("请选择要催发动态的角色");
                        return;
                    }

                    forceModalSubmit.disabled = true;
                    const oldText = forceModalSubmit.innerHTML;
                    forceModalSubmit.innerHTML = '<span class="moment-compose-spinner"></span>生成中…';

                    fetch('/api/moments/force_active', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ char_id: char_id })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.error) {
                            alert("生成失败: " + data.error);
                        } else {
                            closeForceModal();
                            loadNextPage(true); // reload
                        }
                    })
                    .catch(err => alert("网络错误: " + err))
                    .finally(() => {
                        forceModalSubmit.disabled = false;
                        forceModalSubmit.innerHTML = oldText;
                    });
                });
            }

            attachMomentEvents();
            attachComposeEvent();
            initCharFilter();
            initActiveMomentsToggle();
            initForceMoment();
            loadUserLanguage().finally(function() {
                loadNextPage(true);
            });
        })();
    </script>
</body>
</html>

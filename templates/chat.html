    async function resolveStickerNamesToPaths(text, groupElement) {
      if (!text || text.indexOf('[表情]') === -1) return text;
      // 【修正】使用非贪婪匹配，遇到 " / " 或行尾就停止
      const regex = /\[表情\](.*?)(?=\s*\/\s*|$)/g;
      let out = '';
      let lastIndex = 0;
      let m;
      const matches = [];
      while ((m = regex.exec(text)) !== null) {
        matches.push({ index: m.index, lastIndex: regex.lastIndex, nameOrPath: m[1].trim() });
      }
      for (let i = 0; i < matches.length; i++) {
        const { index, lastIndex: nextStart, nameOrPath } = matches[i];
        const isPath = nameOrPath.indexOf('official:') === 0 || nameOrPath.indexOf('user:') === 0;
        out += text.slice(lastIndex, index) + '[表情]';
        if (isPath) {
          out += nameOrPath;
        } else {
          try {
            const r = await fetch('/api/stickers/resolve?name=' + encodeURIComponent(nameOrPath), { credentials: 'include' });
            const data = await r.json();
            if (data && data.path) {
              out += data.path;
            } else {
              var pathFromImg = tryGetPathFromGroupStickerImg(groupElement, i);
              out += pathFromImg || nameOrPath;
            }
          } catch (e) {
            var pathFromImg = tryGetPathFromGroupStickerImg(groupElement, i);
            out += pathFromImg || nameOrPath;
          }
        }
        lastIndex = nextStart;
      }
      out += text.slice(lastIndex);
      return out;
    }

    function tryGetPathFromGroupStickerImg(groupEl, stickerIndex) {
      if (!groupEl) return null;
      var imgs = groupEl.querySelectorAll('.bubble-sticker .sticker-msg-img');
      var img = imgs[stickerIndex];
      if (!img || !img.src) return null;
      try {
        var url = new URL(img.src);
        var path = url.searchParams.get('path');
        return path ? decodeURIComponent(path) : null;
      } catch (e) { return null; }
    }

    function buildResolvedFulltextFromGroup(groupEl) {
      if (!groupEl) return '';
      var parts = [];
      groupEl.querySelectorAll('.message-wrapper').forEach(function(wrap) {
        var sticker = wrap.querySelector('.bubble-sticker');
        if (sticker) {
          var path = wrap.dataset.resolvedStickerPath || wrap.dataset.stickerPath || '';
          parts.push(path ? '[表情]' + path : '');
        } else {
          var b = wrap.querySelector('.bubble');
          // 【修正】使用 innerText 替代 textContent，保留文本的换行符
          if (b) parts.push(b.innerText.trim());
        }
      });
      return parts.filter(Boolean).join(' / ');
    }

  function stripRubyTags(text) {
    if (!text) return text;
    // 移除 <rt>...</rt> 以及里面的注音内容
    text = text.replace(/<rt>.*?<\/rt>/g, '');
    // 移除 <ruby> 和 </ruby> 标签
    text = text.replace(/<\/?ruby>/g, '');
    return text;
  }

  async function openEditModal(id, content, groupElement) {
    currentEditId = id;
    currentEditGroup = groupElement;
    const input = document.getElementById('editInput');
    document.getElementById('editModal').style.display = 'flex';
    input.value = '加载中…';
    input.focus();

    var fullContent = (content != null ? String(content) : '').trim();

    // 清理可能存在的注音标签
    fullContent = stripRubyTags(fullContent);

    var contentToShow = fullContent;
      try {
        var groupEl = groupElement;
        if (!groupEl && id) groupEl = document.querySelector('.message-group[data-id="' + id + '"]');
      if (groupEl) {
        fullContent = (groupEl.dataset.originalContent || groupEl.dataset.resolvedFulltext || fullContent).trim();
        fullContent = stripRubyTags(fullContent);
        contentToShow = fullContent;
      }
        if (fullContent.indexOf('[表情]') >= 0) {
          var paths = [];
          if (groupEl) {
            groupEl.querySelectorAll('.message-wrapper').forEach(function(wrap) {
              if (wrap.querySelector('.bubble-sticker') && (wrap.dataset.resolvedStickerPath || wrap.dataset.stickerPath))
                paths.push(wrap.dataset.resolvedStickerPath || wrap.dataset.stickerPath);
            });
          }
          if (paths.length > 0) {
            var idx = 0;
            // 【修正】使用非贪婪匹配，遇到 " / " 或行尾就停止匹配，保护后续文字
            contentToShow = fullContent.replace(/\[表情\](.*?)(?=\s*\/\s*|$)/g, function(match) {
              return idx < paths.length ? '[表情]' + paths[idx++] : match;
            });
          } else {
            contentToShow = await resolveStickerNamesToPaths(fullContent, groupEl);
          }
        }
      } catch (e) { console.error('openEditModal', e); }
      input.value = contentToShow;
    }

  async function deleteMessage(id, groupElement) {
    if(!confirm("确定要删除这条消息吗？")) return;
    try {
      const res = await fetch(`${getApiPrefix()}/messages/${id}`, { method: 'DELETE' });
      if(res.ok) {
        // 动画效果
        groupElement.style.transition = "all 0.3s ease-out";
        groupElement.style.opacity = "0";
        groupElement.style.transform = "translateX(20px)"; // 往右滑出

        setTimeout(() => {
          // 1. 先拿到它的“上一个邻居” (可能是日期分隔符)
          const prevSibling = groupElement.previousElementSibling;

          // 2. 物理移除当前消息
          groupElement.remove();

          // 3. 【新增】检查“孤儿时间戳”
          // 如果上一个邻居是日期分隔符
          if (prevSibling && prevSibling.classList.contains('date-separator')) {
            const nextSibling = prevSibling.nextElementSibling;

            // 判据：如果后面没有元素了，或者后面紧接着还是一个日期分隔符
            // 说明夹在中间的消息都被删光了
            if (!nextSibling || nextSibling.classList.contains('date-separator')) {
              console.log("移除孤儿时间戳");
              prevSibling.remove();
            }
          }
        }, 300); // 等动画播完再删
      } else {
        alert("删除失败 (后端返回错误)");
      }
    } catch(e) { alert("删除失败 (网络错误)"); }
  }

  // --- 【新增】多选批量删除 ---
  async function deleteSelectedMessages() {
    const selectedEls = Array.from(document.querySelectorAll('.message-group.selected'));
    if (selectedEls.length === 0) return alert("请先选择消息！");

    if (!confirm(`确定删除选中的 ${selectedEls.length} 条消息吗？`)) return;

    let failCount = 0;
    for (const group of selectedEls) {
      const id = group.dataset.id;
      if (!id) { failCount++; continue; }
      try {
        const res = await fetch(`${getApiPrefix()}/messages/${id}`, { method: 'DELETE' });
        if (res.ok) {
          const prevSibling = group.previousElementSibling;
          group.remove();
          // 清理孤儿日期分隔符
          if (prevSibling && prevSibling.classList.contains('date-separator')) {
            const nextSibling = prevSibling.nextElementSibling;
            if (!nextSibling || nextSibling.classList.contains('date-separator')) {
              prevSibling.remove();
            }
          }
        } else {
          failCount++;
        }
      } catch(e) {
        failCount++;
      }
    }

    toggleSelectionMode(); // 退出多选模式
    if (failCount > 0) alert(`部分消息删除失败（${failCount} 条）`);

    // --- 监听点击 & 长按 (兼容 PC Shift 和 手机长按) ---

    // 封装范围选择的核心逻辑
    function handleRangeSelect(targetGroup) {
      if (!targetGroup) return;
      const allGroups = Array.from(document.querySelectorAll('.message-group'));
      const currentIndex = allGroups.indexOf(targetGroup);

      if (lastCheckedIndex !== null) {
        const start = Math.min(lastCheckedIndex, currentIndex);
        const end = Math.max(lastCheckedIndex, currentIndex);
        for (let i = start; i <= end; i++) {
          allGroups[i].classList.add('selected');
        }
      }
      lastCheckedIndex = currentIndex;
      updateSelectCount();

      // 手机震动反馈 (如果有)
      if (navigator.vibrate) navigator.vibrate(50);
    }

    // 封装单选的核心逻辑
    function handleSingleSelect(targetGroup) {
      if (!targetGroup) return;
      targetGroup.classList.toggle('selected');

      const allGroups = Array.from(document.querySelectorAll('.message-group'));
      lastCheckedIndex = allGroups.indexOf(targetGroup);
      updateSelectCount();

      if (e.shiftKey) {
        handleRangeSelect(group); // Shift + 点击
      } else {
        handleSingleSelect(group); // 普通点击
      }
    });

    // --- 手机端长按逻辑 ---
    let touchTimer = null;

    chatContainer.addEventListener('touchstart', (e) => {

      const group = e.target.closest('.message-group');

        touchTimer = setTimeout(() => {

          touchTarget = null; // 触发后清空，防止touchend再次触发单选
        }, 600);

    chatContainer.addEventListener('touchmove', () => {

    chatContainer.addEventListener('touchend', (e) => {
      if (!isSelectionMode) return;

        clearTimeout(touchTimer);

        if (touchTarget) {

          handleSingleSelect(touchTarget);

        const timestampStr = group.dataset.timestamp;
        if (!timestampStr) return;
        const dateObj = new Date(timestampStr);

        // 日期头
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const currentDateStr = `${year}-${month}-${day}`;

        if (currentDateStr !== lastDateStr) {
          const weekDay = weekDays[dateObj.getDay()];
          resultText += `\n${currentDateStr}（${weekDay}）\n`;
          lastDateStr = currentDateStr;
        }

        // 内容：优先导出原始结构化文本（拍一拍/撤回/表情/图片），并去除注音标签
        let contentText = (group.dataset.originalContent || group.dataset.resolvedFulltext || "").trim();
        if (!contentText) {
          const bubbles = group.querySelectorAll('.bubble');
          contentText = "";
          bubbles.forEach((b, idx) => {
            contentText += b.innerText.replace(/\n/g, " ");
            if (idx < bubbles.length - 1) contentText += " / ";
          });
        }
        contentText = stripRubyTags(contentText);

        // 时间
        const hours = String(dateObj.getHours()).padStart(2, '0');
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;

        resultText += `${name}：${contentText}（${timeStr}）\n`;
      });

      // --- 【修改】显示弹窗，而不是直接复制 ---
      exportResultInput.value = resultText.trim();

      // 【新增】同时生成图片版的HTML
      generateExportImageContent();

      exportResultModal.style.display = 'flex';

    async function confirmForward() {
      const checked = document.querySelectorAll('#forwardModalList input[type="checkbox"]:checked');
      if (checked.length === 0) return;

      const selectedEls = Array.from(document.querySelectorAll('.message-group.selected'));
      selectedEls.sort(function(a, b) {
        return (a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING) ? -1 : 1;
      });

      // 判断当前来源类型和 ID（用于生成 CHATLOG 标签）
      const sourceId = isGroupMode ? currentId : currentId;
      let chatlogText = '[CHATLOG:' + sourceId + ']\n';

      // 按日期分组并构建 [DATE] / [LOG]
      let lastDate = '';
      selectedEls.forEach(function(group) {
        const sender = group.dataset.sender || 'user';
        const ts = group.dataset.timestamp;
        if (!ts) return;
        const dateObj = new Date(ts);
        const dateStr = dateObj.getFullYear() + '-' +
          String(dateObj.getMonth() + 1).padStart(2, '0') + '-' +
          String(dateObj.getDate()).padStart(2, '0');
        const timeStr = String(dateObj.getHours()).padStart(2, '0') + ':' +
          String(dateObj.getMinutes()).padStart(2, '0') + ':' +
          String(dateObj.getSeconds()).padStart(2, '0');

        if (dateStr !== lastDate) {
          chatlogText += '[DATE:' + dateStr + ']\n';
          lastDate = dateStr;
        }

        const content = (group.dataset.originalContent || group.dataset.resolvedFulltext || '').trim();
        chatlogText += '[LOG:' + sender + '|' + timeStr + ']' + content + '[/LOG]\n';
      });

      chatlogText += '[/CHATLOG]';

      // 发送到每个目标
      const btn = document.getElementById('forwardConfirmBtn');
      btn.disabled = true;
      btn.textContent = '转发中...';

      let successCount = 0;
      let failCount = 0;

      for (const cb of checked) {
        const targetId = cb.value;
        const targetType = contactsCache[targetId] ? contactsCache[targetId].type : 'chat';
        const endpoint = targetType === 'group'
          ? '/api/group/' + encodeURIComponent(targetId) + '/chat'
          : '/api/' + encodeURIComponent(targetId) + '/chat_v2';

        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: chatlogText })
          });
          if (res.ok) {
            successCount++;
          } else {
            failCount++;
          }
        } catch(e) {
          failCount++;
        }
      }

      closeForwardModal();
      toggleSelectionMode(); // 退出多选模式
      document.getElementById('exportResultModal').style.display = 'none';

      if (failCount === 0) {
        alert('已成功转发给 ' + successCount + ' 个聊天');
      } else {
        alert('成功 ' + successCount + ' 个，失败 ' + failCount + ' 个');
      }
    }

    // 【新增】应用响应式缩放，使图片等比缩小适应预览框宽度，并修改外层容器高度
    function applyResponsiveScale() {
      const preview = document.getElementById('exportImagePreview');
      const wrapper = document.getElementById('exportImageWrapper');
      const content = document.getElementById('exportImageContent');

      if (!preview || !wrapper || !content) return;

      const containerStyle = window.getComputedStyle(preview);
      const paddingLeft = parseFloat(containerStyle.paddingLeft);
      const paddingRight = parseFloat(containerStyle.paddingRight);
      const availableWidth = preview.clientWidth - (paddingLeft + paddingRight);

      const contentWidth = 430;
      let scale = availableWidth / contentWidth;

      // Allow it to only shrink or grow correctly for the layout, but bound it decently.
      scale = Math.min(1, Math.max(0.3, scale));

      // Explicitly center within wrapper with a left adjustment.
      content.style.transformOrigin = '0 0'; // ensure top-left origin
      content.style.transform = `scale(${scale})`;

      const originalHeight = content.scrollHeight; // Use scrollHeight for robust content size
      if (originalHeight > 0) {
        wrapper.style.width = (contentWidth * scale) + 'px';
        wrapper.style.height = (originalHeight * scale) + 'px';
      }
    }

    // 【新增】生成图片版本的HTML内容
    async function generateExportImageContent(hideCharName = false) {
      const selectedEls = Array.from(document.querySelectorAll('.message-group.selected'));
      if (selectedEls.length === 0) return;

      selectedEls.sort((a, b) => {

      });

      // 获取真实的header元素并克隆
      const headerEl = document.querySelector('.chat-header');
      let headerHtml = '';
      if (headerEl) {
        const clonedHeader = headerEl.cloneNode(true);
        const nameEl = clonedHeader.querySelector('.header-name');
        if (nameEl) nameEl.textContent = displayName;
        clonedHeader.querySelectorAll('button').forEach(btn => {
          btn.disabled = true;
          btn.style.opacity = '0.5';
        });

        // 确保 header 中的图片支持 CORS 并强刷缓存
        clonedHeader.querySelectorAll('img').forEach(img => {
            img.setAttribute('crossorigin', 'anonymous');
            if (img.src && !img.src.startsWith('data:')) {
                const url = new URL(img.src, window.location.href);
                // 使用更强的随机参数，确保每一次导出都是全新的请求，彻底避开旧缓存
                url.searchParams.set('x-export-v', Date.now() + Math.random());
                img.src = url.toString();
            }
        });

        const tempDiv = document.createElement('div');
        tempDiv.appendChild(clonedHeader);
        headerHtml = tempDiv.innerHTML;
      }

      // 获取当前页面的背景设置
      const currentBg = window.getComputedStyle(document.body).backgroundImage;
      const currentBgColor = window.getComputedStyle(document.body).backgroundColor;

      // 生成聊天内容区域
      // 【关键】显式应用背景色和背景图到导出容器，并处理背景图跨域
      let messagesHtml = `<div style="background-color: ${currentBgColor}; background-image: ${currentBg}; background-size: cover; background-position: center; background-attachment: scroll; padding: 16px; flex: 1; position: relative;">`;

      let lastDateStr = "";
      const weekDays = ['日', '月', '火', '水', '木', '金', '土'];

      selectedEls.forEach((group) => {
        const ts = group.dataset.timestamp;
        if (!ts) return;
        const dateObj = new Date(ts);
        const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

        if (dateStr !== lastDateStr) {
          const weekDay = weekDays[dateObj.getDay()];
          messagesHtml += `<div style="text-align: center; color: #999; font-size: 12px; margin: 15px 0 10px 0;">${dateStr}（${weekDay}）</div>`;
          lastDateStr = dateStr;
        }

        const clonedGroup = group.cloneNode(true);
        clonedGroup.classList.remove('selected');
        if (hideCharName) {
          clonedGroup.querySelectorAll('.bubble-name').forEach(bn => bn.style.display = 'none');
          clonedGroup.querySelectorAll('.avatar-img').forEach(av => {
            av.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="#cccccc" rx="10"/></svg>');
          });
        }

        // 确保消息中的所有图片支持 CORS 并刷新缓存
        clonedGroup.querySelectorAll('img').forEach(img => {
            img.setAttribute('crossorigin', 'anonymous');
            if (img.src && !img.src.startsWith('data:')) {
                const url = new URL(img.src, window.location.href);
                url.searchParams.set('x-export-v', Date.now() + Math.random());
                img.src = url.toString();
            }
        });

        const tempDiv = document.createElement('div');
        tempDiv.appendChild(clonedGroup);
        messagesHtml += tempDiv.innerHTML;
      });

      messagesHtml += '</div>';

      // 获取真实的input-container并克隆
      const inputContainerEl = document.querySelector('.input-container');
      let footerHtml = '';
      if (inputContainerEl) {
        const clonedFooter = inputContainerEl.cloneNode(true);
        clonedFooter.querySelectorAll('button').forEach(btn => btn.style.display = 'none');
        const textarea = clonedFooter.querySelector('textarea');
        if (textarea) { textarea.disabled = true; textarea.value = ""; }
        const tempDiv = document.createElement('div');
        tempDiv.appendChild(clonedFooter);
        footerHtml = `<div style="border-top: 1px solid var(--primary-lighter);">${tempDiv.innerHTML}</div>`;
      }

      // 组合完整的布局
      let fullHtml = `<div id="export-capture-target" style="font-family: 'Segoe UI', 'PingFang SC', sans-serif; width: 430px; height: auto; display: flex; flex-direction: column; background: white;">
        ${headerHtml}
        ${messagesHtml}
        ${footerHtml}
      </div>`;

      const imageContent = document.getElementById('exportImageContent');
      imageContent.innerHTML = fullHtml;

      // 等待图片加载完成后计算高度并缩放，【新增】预将其转换为 Base64，彻底绝杀渲染时由于 COS 没有配置 CORS 导致的 Tainted 错误
      const images = Array.from(imageContent.querySelectorAll('img'));
      if (images.length > 0) {
        Promise.all(images.map(img => {
          return new Promise(resolve => {
            if (!img.src || img.src.startsWith('data:')) return resolve();

            const tempImg = new Image();
            tempImg.crossOrigin = 'anonymous'; // 尝试跨域加载
            tempImg.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = tempImg.width || 40;
              canvas.height = tempImg.height || 40;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(tempImg, 0, 0);
              try {
                img.src = canvas.toDataURL('image/png'); // 提取安全数据
                img.removeAttribute('crossorigin');      // 移除跨域属性
              } catch(e) {
                // 如果仍然由于远端禁用跨域返回污染，将其降级为同源默认头像
                img.src = '/static/default_avatar.png';
                img.removeAttribute('crossorigin');
              }
              resolve();
            };
            tempImg.onerror = () => {
              // 失败降级
              img.src = '/static/default_avatar.png';
              img.removeAttribute('crossorigin');
              resolve();
            };
            // 设置一个随机数强刷避免缓存污染
            const fetchUrl = new URL(img.src, window.location.href);
            fetchUrl.searchParams.set('t2', Date.now() + Math.random());
            tempImg.src = fetchUrl.toString();
          });
        })).then(() => {
          setTimeout(applyResponsiveScale, 150);
        });
      } else {
        setTimeout(applyResponsiveScale, 100);
      }
    }

  // --- 核心：跳转定位 (后端托管版) ---
  async function jumpToMessage(id) {
    closeSearchModal();

    let targetEl = document.querySelector(`.message-group[data-id="${id}"]`);

    if (targetEl) {
      highlightAndScroll(targetEl);
    } else {
      // 重新加载
      chatContainer.innerHTML = '';
      loadMoreContainer.style.display = 'block'; // 先显示出来
      isLoading = true;

      try {
        // 【修改】直接传 target_id，不传 page，让后端自己算 limit
        const res = await fetch(`${getApiPrefix()}/history?target_id=${id}`);
        const data = await res.json();

        totalMessages = data.total;

        // 渲染
        for (const msg of data.messages.reverse()) {
          renderMessageGroup(msg, 'prepend');
        }
        refreshDateSeparators();

        isLoading = false;

        // 3. 定位
        setTimeout(() => {
          targetEl = document.querySelector(`.message-group[data-id="${id}"]`);
          if (targetEl) {
            highlightAndScroll(targetEl);
            loadMoreContainer.style.display = 'block';
          } else {
            alert("定位失败 (可能消息已被物理删除)");
          }
        }, 300);
        showCachedTranslations();

      } catch (e) {
        console.error(e);
        alert("跳转出错");
        isLoading = false;
      }
    }
  }

            const formData = new FormData();
            formData.append('file', file);

            // 1. 上传图片并获取识图结果
            const uploadRes = await fetch('/api/vision/upload', {
              method: 'POST',
              body: formData
            });
            const uploadData = await uploadRes.json();

            if (uploadData.error || uploadData.status !== 'success') {
              alert('图片上传失败：' + (uploadData.error || '未知错误'));
              btn.innerText = originalBtnText;
              btn.disabled = false;
              document.body.removeChild(fileInput);
              return;
            }

            // 2. 存库与发给 AI 的格式：[图片](地址)(描述)。显示时只显示图片
            const path = uploadData.path || uploadData.url.split('/').pop();
            const desc = (uploadData.description || '无').replace(/\)/g, '）'); // 避免描述里的 ) 破坏解析
            const messageContent = `[图片](${path})(${desc})`;

            const endpoint = isGroupMode ? `/api/group/${encodeURIComponent(currentId)}/chat` : `/api/${encodeURIComponent(charId)}/chat_v2`;

            // 3. 复用发送消息逻辑，发给当前聊天对象
            const r = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: messageContent })
            });

            if (!r.ok) throw new Error('Network error');
            const data = await r.json();

            if (data.affinity_delta) showAffinityToast(data.affinity_delta);
            if (data.circuit_breaker) { showCbModal(data.circuit_breaker); return; }

            if (data.error) {
              if (data.error === 'consecutive_tickle') {
                alert(data.message || '操作频繁');
              } else {
                alert('发送失败: ' + data.error);
              }
            } else {
              if (data.memory_sync_warning && typeof showMemorySyncWarning === 'function') showMemorySyncWarning(data.memory_sync_warning);
            }
          } catch (err) {
            console.error('发送图片异常', err);
            alert('图片发送失败！');
          } finally {
            btn.innerText = originalBtnText;
            btn.disabled = false;
            document.body.removeChild(fileInput);
            pollNewMessages();
          }
        };

        fileInput.click();
        return;
      }
      if (action === 'phrases') {
        morePanel.classList.remove('open');
        loadQuickPhrases().then(() => {
          renderQPList();
          qpPanel.classList.add('open');
          setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 300);
        });
        return;
      }
      if (action === 'sticker') {
        morePanel.classList.remove('open');
        openStickerPanel();
      }
      if (action === 'cruise') {
        const url = prompt("请输入要让 AI 查看的网址 (包含 http/https):", "https://www.google.com");
        if (url && url.startsWith('http')) {
          closeAllPanels();
          triggerAgent(url);
        }
      }
    };

    async function initStickerTabs() {
      const toolbar = document.getElementById('stickerToolbar');
      const existingTabs = toolbar.querySelectorAll('.sticker-tab[data-tab^="pack-"]');
      existingTabs.forEach(el => el.remove());

    function switchStickerTab(tab) {
      stickerCurrentTab = tab;
      document.querySelectorAll('#stickerToolbar .sticker-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      const searchView = document.getElementById('stickerSearchView');

        document.getElementById('stickerSearchInput').onkeydown = (e) => { if (e.key === 'Enter') doStickerSearch(); };
        return;
      }

        renderStickerPackList();
        return;
      }
      if (tab === 'favorites') {
        renderStickerFavorites();

        renderPackStickers(packId);

    function debounceStickerSearch() {
      clearTimeout(stickerSearchDebounceTimer);
      stickerSearchDebounceTimer = setTimeout(doStickerSearch, 300);

    async function doStickerSearch() {
      const q = document.getElementById('stickerSearchInput').value.trim();

      if (!q) {
        contentView.innerHTML = '<div class="sticker-hint-inline">输入关键词搜索表情</div>';

        const r = await fetch('/api/stickers/search?q=' + encodeURIComponent(q));

        contentView.innerHTML = '';
        list.forEach(s => {

          const img = document.createElement('img');
          img.src = s.url;
          img.alt = s.name;
          div.appendChild(img);
          const label = document.createElement('span');
          label.className = 'sticker-item-label';
          label.textContent = s.name || '';
          div.appendChild(label);
          div.onclick = () => sendStickerAndClose(s.path, s.name);
          contentView.appendChild(div);
        });

    function triggerStickerUpload() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/png,image/jpeg,image/gif,image/webp';
      input.onchange = () => {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const modal = document.getElementById('stickerUploadModal');
        const nameInput = document.getElementById('stickerUploadNameInput');
        const cancelBtn = document.getElementById('stickerUploadCancelBtn');
        const confirmBtn = document.getElementById('stickerUploadConfirmBtn');
        nameInput.value = '';
        modal.style.display = 'flex';
        nameInput.focus();
        const closeModal = () => { modal.style.display = 'none'; };
        cancelBtn.onclick = closeModal;
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        confirmBtn.onclick = async () => {
          const fd = new FormData();
          fd.append('file', file);
          const name = (nameInput.value || '').trim();
          if (name) fd.append('name', name);
          closeModal();
          try {
            const r = await fetch('/api/stickers/upload', { method: 'POST', body: fd });
            const data = await r.json();
            if (data.path) {
              await fetch('/api/stickers/favorites', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: data.path }) });
              renderStickerFavorites();
            } else if (data.message) alert(data.message);
          } catch (e) { alert('上传失败'); }
        };
      };
      input.click();
    }

  // --- 【辅助函数】复制成功后的视觉反馈 ---
  function showCopySuccess(btn, iconImg) {
    // 让按钮变绿，或者加个类名提示成功
    btn.classList.add('copied');
    btn.style.color = '#4cd964'; // 变绿

    // 1.5秒后恢复原状
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.style.color = '#aaa'; // 恢复灰色
    }, 1500);

  // --- 【核心函数】兼容 HTTP 的老式复制法 ---
  // 原理：偷偷造一个文本框，把字填进去，选中，然后模拟按下 Ctrl+C
  function fallbackCopyTextToClipboard(text, btn, icon) {
    const textArea = document.createElement("textarea");
    textArea.value = text;

    // 把它藏在屏幕外面，但必须是“可见”状态浏览器才允许复制
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    document.body.appendChild(textArea);

    textArea.focus();
    textArea.select();

    try {
      const successful = document.execCommand('copy');
      if (successful) {
        showCopySuccess(btn, icon);
      } else {
        alert('复制失败，请手动长按文字复制');
      }
    } catch (err) {
      console.error('无法复制', err);
      alert('复制失败，请手动长按文字复制');
    }

    document.body.removeChild(textArea);
  }

  // --- 【新增】触发AI Agent执行任务 ---
  async function triggerAgent(url) {
    if (confirm(`让当前角色打开并查看这个网址吗？\n${url}`)) {
      try {
        const response = await fetch('/api/run_agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: url,
            char_id: charId,
            user_id: currentUserId
          })
        });
        const data = await response.json();
        if (data.status) {
          agentIsRunning = true;
          updateAgentUI();
          startAgentPolling();
          alert('Agent已启动！请查看终端或稍后查看聊天报告。');
        } else {
          alert('启动失败：' + (data.error || '未知错误'));
        }
      } catch (err) {
        console.error('Agent Trigger Error:', err);
        alert('启动失败，请检查Agent API服务器（run_agent_api.py）是否正在运行。');
      }
    }
  }

  // --- 【Agent】停止函数（供 stopAgentBtn 按钮调用）---
  function stopAgent() {
    if (!agentIsRunning) return;
    if (!confirm('确定要停止正在运行的 Agent 吗？')) return;
    fetch('/api/agent/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUserId })
    }).then(() => {
      renderSystemMessage('🛑 Agent 已停止');
      agentIsRunning = false;
      agentIsWaiting = false;
      if (agentPollTimer) { clearInterval(agentPollTimer); agentPollTimer = null; }
      updateAgentUI();
    }).catch(e => console.error('[Agent] stop failed:', e));
  }

  // --- 【Agent】轮询状态 ---
  async function checkAgentState() {
    try {
      const res = await fetch(`/api/agent/state?user_id=${currentUserId}`);
      const state = await res.json();
      agentIsRunning = state.running === true;
      agentIsWaiting = state.status === 'waiting_for_user';
      agentQuestion = state.question || '';
      updateAgentUI();
      if (!agentIsRunning) {
        if (agentPollTimer) { clearInterval(agentPollTimer); agentPollTimer = null; }
      }
    } catch (e) {
      // 状态文件可能不存在，忽略
    }
  }

  function startAgentPolling() {
    if (agentPollTimer) clearInterval(agentPollTimer);
    agentPollTimer = setInterval(checkAgentState, 3000);
    checkAgentState();
  }

  function updateAgentUI() {
    const stopBtn = document.getElementById('stopAgentBtn');
    if (stopBtn) {
      stopBtn.style.display = agentIsRunning ? 'inline-block' : 'none';
    }
    const input = document.getElementById('messageInput');
    if (input && agentIsRunning) {
      input.placeholder = agentIsWaiting ? '回复 Agent 的提问…' : 'Agent 运行中，输入 [STOP] 可停止…';
    } else if (input) {
      input.placeholder = '输入消息…';
    }
  }

  function renderSystemMessage(text) {
    const st = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'system-message';
    div.style.cssText = 'text-align:center; color:#999; font-size:12px; padding:8px 0;';
    div.textContent = text;
    st.appendChild(div);
    st.scrollTop = st.scrollHeight;
  }

  // --- 【修正版】执行重新生成 (支持日期分隔符检测) ---
  async function doRegenerate(wrapperElement) {
    if (isLoading) return;

    const messageGroup = wrapperElement.closest('.message-group');

    if(messageGroup) {
      messageGroup.style.transition = "opacity 0.3s";
      messageGroup.style.opacity = '0.5';
      messageGroup.style.cursor = 'wait';
    }

    isLoading = true;

    try {
      const res = await fetch(`${getApiPrefix()}/regenerate`, { method: 'POST' });
      const data = await res.json();

      if (data.affinity_delta) showAffinityToast(data.affinity_delta);
      if (data.circuit_breaker) { showCbModal(data.circuit_breaker); return; }

      if (data.status === 'success') {
        // 1. 移除旧的整组消息
        if (messageGroup) messageGroup.remove();
      } else {
        alert("重生成失败: " + data.error);
        if(messageGroup) {
          messageGroup.style.opacity = '1';
          messageGroup.style.cursor = 'default';
        }
      }
    } catch(e) {
      console.error(e);
      alert("网络错误");
      if(messageGroup) {
        messageGroup.style.opacity = '1';
        messageGroup.style.cursor = 'default';
      }
    } finally {
      isLoading = false;
      pollNewMessages();
    }
  }

  // ==============================
  // 翻译消息功能（上下文由后端从数据库读取前 20 条）
  // ==============================
  const chatHiddenTrans = new Set();
  (function() {
    try {
      const raw = localStorage.getItem('kt_chat_hidden');
      if (raw) { JSON.parse(raw).forEach(k => chatHiddenTrans.add(k)); }
    } catch(e) {}
  })();
  function _saveChatHidden() {
    try { localStorage.setItem('kt_chat_hidden', JSON.stringify([...chatHiddenTrans])); } catch(e) {}
  }

  function _applyPendingTranslation() {
    if (!pendingSentTranslation) return;
    const text = pendingSentTranslation.text;
    pendingSentTranslation = null;
    const userGroup = chatContainer.querySelector('.message-group.user:last-of-type');
    if (!userGroup) return;
    const msgId = parseInt(userGroup.dataset.id, 10);
    if (!msgId || msgId > 1600000000000) return;
    const cacheKey = `kt_chat_${isGroupMode ? 'g' : 'c'}_${currentId}_${msgId}`;
    try { localStorage.setItem(cacheKey, text); } catch (e) {}
    if (!userGroup.querySelector('.translation-result')) {
      const lastWrapper = userGroup.querySelector('.message-wrapper:last-of-type');
      const target = lastWrapper || userGroup.querySelector('.bubble-stack');
      if (target) {
        const transDiv = document.createElement('div');
        transDiv.className = 'translation-result';
        transDiv.style.cssText = 'margin-top: 8px; font-size: 13px; color: #555; background: rgba(0,0,0,0.05); padding: 6px 10px; border-radius: 6px; border-left: 3px solid #666;';
        transDiv.textContent = text;
        target.appendChild(transDiv);
      }
    }
  }

  function _getChatTransCacheKey(msgId, group) {
    const chatType = isGroupMode ? 'g' : 'c';
    if (!Number.isNaN(msgId) && msgId > 0) {
      return `kt_chat_${chatType}_${currentId}_${msgId}`;
    }
    const rawText = (group.dataset.originalContent || group.dataset.resolvedFulltext || '').trim();
    if (rawText) {
      let hash = 0;
      for (let i = 0; i < rawText.length; i++) {
        const ch = rawText.charCodeAt(i);
        hash = ((hash << 5) - hash) + ch;
        hash |= 0;
      }
      return `kt_chat_${chatType}_${currentId}_txt_${Math.abs(hash)}`;
    }
    return null;
  }

  function _chatTransToggleKey(msgId) {
    return (isGroupMode ? 'g' : 'c') + '|' + currentId + '|' + msgId;
  }

  function showCachedTranslations() {
    const groups = document.querySelectorAll('.message-group');
    groups.forEach(group => {
      const msgId = parseInt(group.dataset.id, 10);
      const cacheKey = _getChatTransCacheKey(msgId, group);
      if (!cacheKey) return;
      const cached = localStorage.getItem(cacheKey);
      if (!cached) return;
      const toggleKey = _chatTransToggleKey(msgId);
      if (chatHiddenTrans.has(toggleKey)) return;
      const existing = group.querySelector('.translation-result');
      if (existing) return;
      const lastWrapper = group.querySelector('.message-wrapper:last-of-type');
      const bubbleStack = group.querySelector('.bubble-stack');
      const target = lastWrapper || bubbleStack;
      if (!target) return;
      const transDiv = document.createElement('div');
      transDiv.className = 'translation-result';
      transDiv.style.cssText = 'margin-top: 8px; font-size: 13px; color: #555; background: rgba(0,0,0,0.05); padding: 6px 10px; border-radius: 6px; border-left: 3px solid #666;';
      transDiv.textContent = cached;
      target.appendChild(transDiv);
    });
  }

  async function translateMessage(wrapper, id, group) {
    const msgId = parseInt(group.dataset.id || id, 10);
    const cacheKey = _getChatTransCacheKey(msgId, group);
    const toggleKey = _chatTransToggleKey(msgId);

    let transDiv = wrapper.querySelector('.translation-result');

    // 当前正在显示 → 隐藏
    if (transDiv && !chatHiddenTrans.has(toggleKey)) {
      transDiv.style.display = 'none';
      chatHiddenTrans.add(toggleKey);
      _saveChatHidden();
      return;
    }

    // 之前被隐藏 → 清除缓存，强制重新翻译
    if (chatHiddenTrans.has(toggleKey)) {
      chatHiddenTrans.delete(toggleKey);
      _saveChatHidden();
      if (cacheKey) { try { localStorage.removeItem(cacheKey); } catch (e) {} }
    }

    // 移除旧的翻译 div
    if (transDiv) { transDiv.remove(); transDiv = null; }

    // 创建新的翻译 div
    transDiv = document.createElement('div');
    transDiv.className = 'translation-result';
    transDiv.style.cssText = 'margin-top: 8px; font-size: 13px; color: #555; background: rgba(0,0,0,0.05); padding: 6px 10px; border-radius: 6px; border-left: 3px solid #666;';

    // 首次翻译：先尝试从缓存加载
    if (!chatHiddenTrans.has(toggleKey) && cacheKey) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        transDiv.textContent = cached;
        wrapper.appendChild(transDiv);
        return;
      }
    }

    transDiv.textContent = '正在翻译...';
    wrapper.appendChild(transDiv);

    // 【修改】动态确定翻译方向
    let fromLang = 'ja';
    if (!isGroupMode && aiLanguage) {
      fromLang = aiLanguage;
    } else if (isGroupMode) {
        const senderId = group.dataset.senderId || group.dataset.role;
        if (senderId && groupMembers[senderId] && groupMembers[senderId].language) {
            fromLang = groupMembers[senderId].language;
        } else {
            fromLang = aiLanguage || 'ja';
        }
    }
    const payload = { direction: `${fromLang}_to_zh` };

    if (!Number.isNaN(msgId) && msgId > 0) {
      payload.message_id = msgId;
      if (isGroupMode) payload.group_id = currentId;
      else payload.char_id = currentId;
    } else {
      const allGroups = Array.from(document.querySelectorAll('.message-group'));
      const currentIndex = allGroups.indexOf(group);
      const start = Math.max(0, currentIndex - 5);
      const contextGroups = currentIndex > 0 ? allGroups.slice(start, currentIndex) : [];
      const contextStr = contextGroups.map(g => {
        const raw = (g.dataset.resolvedFulltext || g.dataset.originalContent || "").trim();
        return stripRubyTags(raw);
      }).filter(Boolean).join('\n');
      const rawText = (group.dataset.originalContent || group.dataset.resolvedFulltext || wrapper.dataset.fulltext || "").trim();
      payload.text = stripRubyTags(rawText);
      payload.context = contextStr;
      if (isGroupMode) payload.group_id = currentId;
      else payload.char_id = currentId;
    }

    try {
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.result) {
        transDiv.textContent = data.result;
        if (cacheKey) {
          try { localStorage.setItem(cacheKey, data.result); } catch (e) {}
        }
      } else {
        transDiv.textContent = '翻译失败：' + (data.error || '未知错误');
      }
    } catch (err) {
      transDiv.textContent = '请求翻译接口失败';
    }
  }

  // --- 【新增】解决“返回不刷新”的问题 ---
  window.addEventListener('pageshow', async (event) => {
    // event.persisted 为 true 表示页面是从缓存里恢复的（比如点了后退键）
    // window.performance.navigation.type === 2 也表示后退操作
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      console.log("检测到页面从缓存恢复，正在刷新 UI...");

      // 1. 刷新头像、名字、在线状态 (这是最轻量的)
      await initUI();
      showCachedTranslations();

      // 2. (可选) 如果您希望聊天记录也刷新（比如刚才删了消息），可以把下面这行注释打开
      // chatContainer.innerHTML = '';
      // await loadHistory('initial');
    }
  });

  // --- 【新增】强制更新已读状态 ---
  function markAsRead() {
    // 使用 keepalive: true，确保页面跳转/关闭时请求依然能发出去
    fetch(`/api/${currentId}/mark_read`, {
      method: 'POST',
      keepalive: true
    }).catch(err => console.error("标记已读失败", err));
  }

  function goBack() {
    markAsRead(); // 1. 先标记已读
    window.location.href = '/'; // 2. 再跳转
  }

  // 【新增】图片导出相关的按钮事件
  // 4. 弹窗内的复制按钮事件 (文字版)
  if (document.getElementById('copyResultBtn')) {
    document.getElementById('copyResultBtn').addEventListener('click', () => {
      const text = document.getElementById('exportResultInput').value;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const originalText = document.getElementById('copyResultBtn').textContent;
          document.getElementById('copyResultBtn').textContent = "复制成功！";
          setTimeout(() => {
            document.getElementById('copyResultBtn').textContent = originalText;
          }, 1500);
        });
      } else {
        document.getElementById('exportResultInput').select();
        document.execCommand('copy');
        alert("已尝试复制，如果失败请手动复制文本框内容。");
      }
    });
  }

  // 复制图片按钮事件
  if (document.getElementById('copyImageBtn')) {
    document.getElementById('copyImageBtn').addEventListener('click', async () => {
      const imageContent = document.getElementById('exportImageContent');
      try {
        if (typeof html2canvas === 'undefined') {
          alert('图片生成库加载中，请稍候再试');
          return;
        }

        const cloneContent = imageContent.cloneNode(true);
        cloneContent.style.transform = 'none';
        cloneContent.style.position = 'absolute';
        cloneContent.style.top = '-9999px';
        cloneContent.style.left = '-9999px';
        document.body.appendChild(cloneContent);

        const canvas = await html2canvas(cloneContent, {
          scale: 2,
          logging: false,
          backgroundColor: null,
          allowTaint: false,
          useCORS: true,
          proxy: null,
          width: 430,
          windowWidth: 430,
          scrollX: 0,
          scrollY: 0,
          onclone: (doc) => {
              doc.querySelectorAll('img').forEach(img => {
                  img.setAttribute('crossorigin', 'anonymous');
              });
          }
        });

        document.body.removeChild(cloneContent);

        canvas.toBlob(function(blob) {
          if (!blob) {
            alert('生成图片失败，请尝试下载后手动使用。');
            return;
          }
          navigator.clipboard.write([
            new ClipboardItem({
              'image/png': blob
            })
          ]).then(() => {
            const originalText = document.getElementById('copyImageBtn').textContent;
            document.getElementById('copyImageBtn').textContent = "复制成功！";
            setTimeout(() => {
              document.getElementById('copyImageBtn').textContent = originalText;
            }, 1500);
          }).catch(err => {
            console.error(err);
            alert('复制失败，请尝试下载后手动使用。');
          });
        });
      } catch (err) {
        alert('生成图片失败：' + err.message);
      }
    });
  }

  // 下载图片按钮事件
  if (document.getElementById('downloadImageBtn')) {
    document.getElementById('downloadImageBtn').addEventListener('click', async () => {
      const imageContent = document.getElementById('exportImageContent');
      try {
        if (typeof html2canvas === 'undefined') {
          alert('图片生成库加载中，请稍候再试');
          return;
        }

        const cloneContent = imageContent.cloneNode(true);
        cloneContent.style.transform = 'none';
        cloneContent.style.position = 'absolute';
        cloneContent.style.top = '-9999px';
        cloneContent.style.left = '-9999px';
        document.body.appendChild(cloneContent);

        const canvas = await html2canvas(cloneContent, {
          scale: 2,
          logging: false,
          backgroundColor: null,
          allowTaint: false,
          useCORS: true,
          proxy: null,
          width: 430,
          windowWidth: 430,
          scrollX: 0,
          scrollY: 0,
          onclone: (doc) => {
              doc.querySelectorAll('img').forEach(img => {
                  img.setAttribute('crossorigin', 'anonymous');
              });
          }
        });

        document.body.removeChild(cloneContent);

        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `chat_export_${new Date().getTime()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        const originalText = document.getElementById('downloadImageBtn').textContent;
        document.getElementById('downloadImageBtn').textContent = "下载成功！";
        setTimeout(() => {
          document.getElementById('downloadImageBtn').textContent = originalText;
        }, 1500);
      } catch (err) {
        alert('下载图片失败：' + err.message);
      }
    });
  }

  // 【新增】创建交互式 HTML 块（iframe 沙箱隔离 ID/CSS/脚本）
  function createHtmlBlock(htmlContent) {
    var wrapper = document.createElement('div');
    wrapper.classList.add('html-block-container');

    var iframe = document.createElement('iframe');
    iframe.classList.add('html-block-iframe');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    iframe.style.cssText = 'width:100%;border:none;overflow:hidden;display:block;min-height:100px;';

    var autoResize = '\x3Cscript\x3E' +
      'var __hbFull=!1,__hbFixed=[];' +
      'function __hbSendH(why){' +
        'var d=document.documentElement,b=document.body,' +
        'h=Math.max(d.scrollHeight||0,d.offsetHeight||0,b.scrollHeight||0,b.offsetHeight||0);' +
        'parent.postMessage({type:"hbResize",height:h,full:__hbFull,why:why||""},"*");' +
      '}' +
      'function __hbCheckFS(){' +
        'var has=!1;' +
        'for(var i=0;i<__hbFixed.length;i++){' +
          'var s=getComputedStyle(__hbFixed[i]);' +
          'if(s.position==="fixed"&&s.display!=="none"&&s.visibility!=="hidden"){has=!0;break;}' +
        '}' +
        'if(has!==__hbFull){__hbFull=has;__hbSendH("fs");}' +
      '}' +
      'window.addEventListener("load",function(){' +
        'var els=document.querySelectorAll("*");' +
        'for(var i=0;i<els.length;i++){' +
          'var s=getComputedStyle(els[i]);' +
          'if(s.position==="fixed"&&parseInt(s.zIndex)>=50){__hbFixed.push(els[i]);}' +
        '}' +
        'new MutationObserver(__hbCheckFS).observe(document.documentElement,{attributes:!0,subtree:!0,attributeFilter:["class","style"]});' +
        'new ResizeObserver(function(){__hbSendH("rs");}).observe(document.documentElement);' +
        '__hbSendH("init");' +
      '});' +
    '\x3C/script\x3E';

    iframe.srcdoc = htmlContent + autoResize;

    wrapper.appendChild(iframe);
    return { wrapper: wrapper, iframe: iframe };
  }

  // 【监听】iframe 高度变化 + 弹窗全屏检测
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'hbResize') return;
    var iframes = document.querySelectorAll('.html-block-iframe');
    for (var i = 0; i < iframes.length; i++) {
      if (iframes[i].contentWindow === e.source) {
        if (e.data.full) {
          iframes[i].style.height = '';
          iframes[i].classList.add('fullscreen');
        } else {
          iframes[i].classList.remove('fullscreen');
          // 跳过全屏切换瞬间的 fs 消息（高度仍为全屏残留值），等 ResizeObserver 的 rs 消息
          if (e.data.why !== 'fs') {
            iframes[i].style.height = e.data.height + 'px';
          }
        }
        break;
      }
    }
  });
</script>

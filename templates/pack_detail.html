<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ name }} - 表情包</title>
  <style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;

  /* 柔和渐变背景 */
  background: linear-gradient(180deg,#fff7f8,#ffeef1);

  color: #333;
  padding-bottom: 70px;
}

/* 顶部栏 */

.header{
  position: sticky;
  top:0;
  z-index:10;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:14px 18px;

  background:rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);

  border-bottom:1px solid rgba(255,182,185,0.2);
}

.header-name{
  font-size:18px;
  font-weight:600;
  color:#444;
}

/* 返回 */

.back-link{
  color:#ff8da1;
  text-decoration:none;
  font-size:14px;
  margin-right:12px;
}

/* 添加按钮 */

.btn-add{

  padding:8px 18px;

  border:none;
  border-radius:22px;

  background:linear-gradient(135deg,#ffb6b9,#ffa0c5);

  color:#fff;
  font-size:14px;
  font-weight:500;

  cursor:pointer;

  box-shadow:0 4px 10px rgba(255,150,170,0.35);

  transition:all 0.2s ease;
}

.btn-add:hover{
  transform:translateY(-1px);
}

.btn-add:active{
  transform:scale(0.95);
}

.btn-add:disabled{
  opacity:0.6;
  box-shadow:none;
}

/* 表情区域 */

.main{

  padding:18px;

  display:grid;

  grid-template-columns:repeat(auto-fill,minmax(88px,1fr));

  grid-auto-rows:minmax(128px,auto);

  gap:18px;

  align-content:start;
}

/* 表情卡片：固定高度，数量多时也不压缩 */

.sticker-cell{

  display:flex;
  flex-direction:column;
  align-items:center;

  min-height:128px;

  flex-shrink:0;

  padding:10px;

  border-radius:16px;

  background:rgba(255,255,255,0.75);

  backdrop-filter: blur(8px);

  box-shadow:
    0 6px 14px rgba(255,180,190,0.18);

  cursor:pointer;

  transition:all 0.2s ease;
}

/* hover */

.sticker-cell:hover{

  transform:translateY(-4px);

  box-shadow:
    0 10px 20px rgba(255,160,180,0.25);
}

/* 点击 */

.sticker-cell:active{

  transform:scale(0.94);
}

/* 表情图片：固定尺寸，不随数量压缩 */

.sticker-cell img{

  width:70px;
  height:70px;
  min-width:70px;
  min-height:70px;
  flex-shrink:0;

  object-fit:contain;

  border-radius:10px;

  transition:transform 0.2s;
}

.sticker-cell:hover img{
  transform:scale(1.05);
}

/* 名字 */

.label{

  margin-top:8px;

  font-size:12px;

  color:#777;

  text-align:center;

  max-width:100%;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* 底部 */

.footer{

  position:fixed;
  bottom:0;
  left:0;
  right:0;

  padding:12px;

  background:rgba(255,255,255,0.9);

  backdrop-filter:blur(10px);

  border-top:1px solid rgba(255,180,185,0.25);

  font-size:12px;
  color:#999;

  text-align:center;
}
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex; align-items:center;">
      <a href="javascript:history.back()" class="back-link">← 返回</a>
      <span class="header-name">{{ name }}</span>
    </div>
    <button type="button" class="btn-add" id="btnAdd">{% if added %}已添加{% else %}添加{% endif %}</button>
  </div>

  <div class="main" id="stickerGrid">
    {% for s in stickers %}
    <div class="sticker-cell" data-path="{{ s.path }}">
      <img src="{{ s.url }}" alt="{{ s.name }}" loading="lazy" />
      <span class="label">{{ s.name }}</span>
    </div>
    {% endfor %}
  </div>

  <div class="footer">作者：{{ author }}</div>

  <script type="application/json" id="pack-detail-data">{{ { 'packId': pack_id, 'fromChar': from_char | default('', true), 'fromGroup': from_group | default('0', true), 'added': added | default(false, true) } | tojson }}</script>
  <script>
    (function() {
      const data = JSON.parse(document.getElementById('pack-detail-data').textContent);
      const packId = data.packId;
      const fromChar = data.fromChar;
      const fromGroup = data.fromGroup;
      if (data.added) document.getElementById('btnAdd').disabled = true;

    document.getElementById('btnAdd').onclick = async function() {
      const btn = this;
      if (btn.disabled) return;
      try {
        const r = await fetch('/api/stickers/packs/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pack_id: packId })
        });
        const data = await r.json();
        if (data.status === 'success') {
          btn.textContent = '已添加';
          btn.disabled = true;
        } else {
          alert(data.message || '添加失败');
        }
      } catch (e) {
        alert('添加失败');
      }
    };

    document.getElementById('stickerGrid').addEventListener('click', function(e) {
      const cell = e.target.closest('.sticker-cell');
      if (!cell) return;
      const path = cell.dataset.path;
      if (!path) return;
      const content = '[表情]' + path;
      if (!fromChar) {
        if (history.length > 1) history.back();
        else window.location.href = '/contacts';
        return;
      }
      const base = fromGroup === '1' ? '/chat/group/' : '/chat/';
      const url = base + encodeURIComponent(fromChar) + '?sticker=' + encodeURIComponent(content);
      window.location.href = url;
    });

    })();
  </script>
</body>
</html>

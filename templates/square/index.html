<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色广场</title>
    <script src="/static/theme-loader.js"></script>
    <style>
        :root {
            --primary-color: #ffb6b9;
            --primary-dark: #f09598;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #8ca0b3;
            --border-color: #edf1f5;
            --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.03);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            margin: 0; padding: 0;
            color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            width: 100%;
        }

        .header-title { font-size: 18px; font-weight: 700; flex-shrink: 0; }

        .search-container {
            flex: 1; margin-left: 20px; position: relative; min-width: 0;
        }
        .search-input {
            width: 100%; padding: 8px 12px 8px 32px;
            border-radius: 20px; border: 1px solid var(--border-color);
            background: #f1f3f5; font-size: 14px; outline: none;
        }
        .search-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); pointer-events: none;
        }

        .main-container {
            display: flex; flex: 1; overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 120px; background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto; padding: 15px 0;
            flex-shrink: 0;
        }
        .sidebar-section-title {
            padding: 0 15px 8px; font-size: 12px; color: var(--text-muted); font-weight: 600;
        }
        .sidebar-item {
            padding: 10px 15px; font-size: 14px; cursor: pointer;
            transition: all 0.2s; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: var(--bg-color); color: var(--primary-color); font-weight: 600;
        }
        .sidebar-item .count {
            font-size: 11px; background: #f1f3f5; padding: 1px 5px; border-radius: 10px; color: var(--text-muted);
        }

        /* 主要内容区 */
        .content {
            flex: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px; align-content: start;
        }

        .char-card {
            background: var(--card-bg); border-radius: var(--radius-md);
            padding: 10px; text-align: center; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .char-card:active { transform: scale(0.95); }
        .char-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            object-fit: cover; margin-bottom: 8px;
            border: 2px solid var(--border-color);
        }
        .char-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .char-ip { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .fab-upload {
            position: fixed; right: 20px; bottom: 80px;
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--primary-color); color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 182, 185, 0.4);
            cursor: pointer; z-index: 101;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">角色广场</div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-input" placeholder="搜索角色、IP或标签...">
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-section-title">我的</div>
            <div class="sidebar-item" id="btn-myposts">我的发布</div>
            <div class="sidebar-item" id="btn-fav">我的收藏</div>
            <div class="sidebar-section-title" style="margin-top:15px;">IP 分类</div>
            <div class="sidebar-item active" id="btn-all">全部角色</div>
            <div id="ip-list">
                <!-- IP 动态加载 -->
            </div>
        </div>
        <div class="content" id="char-grid">
            <!-- 角色列表动态加载 -->
        </div>
    </div>

    <a href="/square/upload" class="fab-upload">
        <svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
    </a>

    {% include 'tabbar.html' %}

    <script>
        let currentIp = "";
        let currentSearch = "";
        let showingFavs = false;
        let showingMyPosts = false;

        async function loadIps() {
            const res = await fetch('/api/square/ips');
            const ips = await res.json();
            const list = document.getElementById('ip-list');
            ips.forEach(ip => {
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.dataset.ip = ip.name;
                div.innerHTML = `${ip.name} <span class="count">${ip.count}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    currentIp = ip.name;
                    showingFavs = false;
                    loadCharacters();
                };
                list.appendChild(div);
            });
        }

        async function loadCharacters() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 20px;">加载中...</div>';
            
            let url;
            if (showingFavs) {
                url = '/api/square/favorites/list';
            } else if (showingMyPosts) {
                url = '/api/square/my_posts';
            } else {
                url = `/api/square/list?ip=${encodeURIComponent(currentIp)}&search=${encodeURIComponent(currentSearch)}`;
            }

            const res = await fetch(url);
            const chars = await res.json();
            
            grid.innerHTML = "";
            if (chars.length === 0) {
                let msg = '暂无匹配角色';
                if (showingFavs) msg = '收藏夹空空如也';
                if (showingMyPosts) msg = '你还没有发布过角色';
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 20px;">${msg}</div>`;
                return;
            }
            
            chars.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => location.href = `/square/character/${c.id}`;
                card.innerHTML = `
                    <img src="${c.avatar}" class="char-avatar" onerror="this.src='/static/default_avatar.png'">
                    <div class="char-name">${c.name}</div>
                    <div class="char-ip">${c.ip || ''}</div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').oninput = (e) => {
            currentSearch = e.target.value;
            showingFavs = false; 
            showingMyPosts = false;
            loadCharacters();
        };

        document.getElementById('btn-all').onclick = function() {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            currentIp = "";
            showingFavs = false;
            showingMyPosts = false;
            loadCharacters();
        };

        document.getElementById('btn-fav').onclick = function() {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showingFavs = true;
            showingMyPosts = false;
            currentIp = "";
            loadCharacters();
        };

        document.getElementById('btn-myposts').onclick = function() {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showingMyPosts = true;
            showingFavs = false;
            currentIp = "";
            loadCharacters();
        };

        loadIps();
        loadCharacters();
    </script>
</body>
</html>

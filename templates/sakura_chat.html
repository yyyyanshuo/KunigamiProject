<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sakura AI</title>
<style>
:root {
  --sakura-pink: #ffb6b9;
  --sakura-dark: #f09598;
  --sakura-light: #fff3f8;
  --sakura-bg: #fdf2f4;
  --sakura-border: #f5d5d8;
  --white: #ffffff;
  --text: #2d2d2d;
  --text-secondary: #6b6b6b;
  --user-bubble: #ffb6b9;
  --user-text: #ffffff;
  --ai-bubble: #ffffff;
  --ai-border: #f0d4d7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--sakura-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  background: var(--white);
  border-bottom: 1px solid var(--sakura-border);
  gap: 10px;
}

.header-logo {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-dark));
  border-radius: 50%;
  flex-shrink: 0;
}

.header-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.header-subtitle {
  font-size: 11px;
  color: var(--text-secondary);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.welcome {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.welcome-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.welcome-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.welcome-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

.message-row {
  display: flex;
  gap: 8px;
  max-width: 85%;
}

.message-row.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-row.assistant {
  align-self: flex-start;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.avatar.ai {
  background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-dark));
  color: white;
}

.avatar.user {
  background: var(--sakura-light);
  color: var(--sakura-dark);
  border: 1px solid var(--sakura-border);
}

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.bubble.ai {
  background: var(--ai-bubble);
  border: 1px solid var(--ai-border);
  color: var(--text);
  border-top-left-radius: 4px;
}

.bubble.user {
  background: var(--user-bubble);
  color: var(--user-text);
  border-top-right-radius: 4px;
}

.message-time {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 2px;
  padding: 0 4px;
}

.user .message-time { text-align: right; }

.typing-indicator {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: var(--ai-bubble);
  border: 1px solid var(--ai-border);
  border-radius: 16px;
  border-top-left-radius: 4px;
}

.typing-dot {
  width: 8px;
  height: 8px;
  background: var(--sakura-dark);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite ease-in-out;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--white);
  border-top: 1px solid var(--sakura-border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  resize: none;
  border: 1px solid var(--sakura-border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  background: var(--sakura-light);
  color: var(--text);
  transition: border-color 0.2s;
}

.chat-input:focus {
  border-color: var(--sakura-dark);
  background: var(--white);
}

.chat-input::placeholder {
  color: #c4a1a3;
}

.send-btn {
  flex-shrink: 0;
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-dark));
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s, transform 0.15s;
}

.send-btn:hover {
  opacity: 0.9;
}

.send-btn:active {
  transform: scale(0.95);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}

.status-text {
  font-size: 11px;
  color: var(--text-secondary);
}

.clear-btn {
  font-size: 11px;
  color: var(--sakura-dark);
  background: none;
  border: 1px solid var(--sakura-border);
  border-radius: 12px;
  padding: 3px 12px;
  cursor: pointer;
  transition: background 0.2s;
}

.clear-btn:hover {
  background: var(--sakura-light);
}

.error-banner {
  background: #fff0f0;
  border: 1px solid #ffcccc;
  color: #cc3333;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin: 0 16px;
  display: none;
}

/* Scrollbar */
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--sakura-border); border-radius: 2px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-row { animation: fadeIn 0.25s ease-out; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"></div>
  <div>
    <div class="header-title" id="header-title" name="header-title">Sakura AI</div>
    <div class="header-subtitle" id="header-subtitle" name="header-subtitle">Gemini 3.5 Flash</div>
  </div>
</div>

<div class="chat-messages" id="chat-messages" name="chat-messages">
  <div class="welcome" id="welcome-screen" name="welcome-screen">
    <div class="welcome-icon">&#127800;</div>
    <div class="welcome-title">Sakura AI</div>
    <div class="welcome-subtitle">有什么可以帮你的吗？</div>
  </div>
</div>

<div class="error-banner" id="error-banner" name="error-banner"></div>

<div class="input-area" id="input-area" name="input-area">
  <div class="input-row">
    <textarea
      class="chat-input"
      id="chat-input"
      name="chat-input"
      placeholder="输入消息..."
      rows="1"
      autofocus
    ></textarea>
    <button
      class="send-btn"
      id="send-btn"
      name="send-btn"
      title="发送"
      onclick="sendMessage()"
    >&#10148;</button>
  </div>
  <div class="status-bar">
    <span class="status-text" id="status-text" name="status-text">可以开始对话了</span>
    <button class="clear-btn" id="clear-btn" name="clear-btn" onclick="clearHistory()">清空上下文</button>
  </div>
</div>

<script>
const STORAGE_KEY = "sakura_chat_history";
const MAX_TURNS = 20;

var isLoading = false;

function getHistory() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch (e) {
    var trimmed = history.slice(-20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
  }
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
  var container = document.getElementById("chat-messages");
  container.innerHTML = '<div class="welcome" id="welcome-screen" name="welcome-screen"><div class="welcome-icon">&#127800;</div><div class="welcome-title">Sakura AI</div><div class="welcome-subtitle">有什么可以帮你的吗？</div></div>';
  document.getElementById("status-text").textContent = "上下文已清空";
  document.getElementById("chat-input").focus();
}

function trimHistory(history) {
  var maxMessages = MAX_TURNS * 2;
  if (history.length > maxMessages) {
    return history.slice(history.length - maxMessages);
  }
  return history;
}

function formatTime() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  if (m < 10) m = "0" + m;
  return h + ":" + m;
}

function removeWelcome() {
  var welcome = document.getElementById("welcome-screen");
  if (welcome) welcome.remove();
}

function createMessageElement(role, content, index) {
  var row = document.createElement("div");
  row.className = "message-row " + role;
  row.id = "msg-row-" + index;
  row.setAttribute("name", "msg-row-" + index);

  var avatar = document.createElement("div");
  avatar.className = "avatar " + (role === "user" ? "user" : "ai");
  avatar.textContent = role === "user" ? "U" : "S";

  var bubbleWrap = document.createElement("div");

  var bubble = document.createElement("div");
  bubble.className = "bubble " + (role === "user" ? "user" : "ai");
  bubble.id = "msg-content-" + index;
  bubble.setAttribute("name", "msg-content-" + index);
  bubble.textContent = content;

  var time = document.createElement("div");
  time.className = "message-time";
  time.textContent = formatTime();

  bubbleWrap.appendChild(bubble);
  bubbleWrap.appendChild(time);

  row.appendChild(avatar);
  row.appendChild(bubbleWrap);

  return row;
}

function renderAllMessages() {
  var history = getHistory();
  var container = document.getElementById("chat-messages");

  var existingMsgIds = {};
  container.querySelectorAll(".message-row").forEach(function(el) {
    existingMsgIds[el.id] = true;
  });

  history.forEach(function(msg, i) {
    var rowId = "msg-row-" + i;
    if (!existingMsgIds[rowId]) {
      var el = createMessageElement(msg.role, msg.content, i);
      container.appendChild(el);
    }
    delete existingMsgIds[rowId];
  });

  Object.keys(existingMsgIds).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
  });
}

function addMessageToUI(role, content) {
  removeWelcome();
  var history = getHistory();
  history.push({ role: role, content: content });
  history = trimHistory(history);
  saveHistory(history);

  renderAllMessages();

  var container = document.getElementById("chat-messages");
  container.scrollTop = container.scrollHeight;

  updateStatusText();
}

function showTyping() {
  removeWelcome();
  var indicator = document.createElement("div");
  indicator.className = "typing-indicator";
  indicator.id = "typing-indicator";
  indicator.setAttribute("name", "typing-indicator");
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  document.getElementById("chat-messages").appendChild(indicator);
  document.getElementById("chat-messages").scrollTop = document.getElementById("chat-messages").scrollHeight;
}

function hideTyping() {
  var indicator = document.getElementById("typing-indicator");
  if (indicator) indicator.remove();
}

function updateStatusText() {
  var history = getHistory();
  var turns = Math.floor(history.length / 2);
  document.getElementById("status-text").textContent = "上下文: " + turns + "/" + MAX_TURNS + " 轮";
}

function setLoading(loading) {
  isLoading = loading;
  var sendBtn = document.getElementById("send-btn");
  var input = document.getElementById("chat-input");
  sendBtn.disabled = loading;
  input.disabled = loading;
}

function showError(msg) {
  var banner = document.getElementById("error-banner");
  banner.textContent = msg;
  banner.style.display = "block";
  setTimeout(function() {
    banner.style.display = "none";
  }, 5000);
}

function sendMessage() {
  if (isLoading) return;

  var input = document.getElementById("chat-input");
  var message = input.value.trim();

  if (!message) return;

  input.value = "";
  input.style.height = "auto";

  addMessageToUI("user", message);

  setLoading(true);
  document.getElementById("status-text").textContent = "思考中...";
  showTyping();

  var history = getHistory();

  fetch("/api/sakura/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: message,
      history: history.slice(0, -1)
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    hideTyping();
    setLoading(false);

    if (data.error) {
      showError(data.reply);
      addMessageToUI("assistant", "（系统错误：" + data.reply + "）");
    } else {
      addMessageToUI("assistant", data.reply);
    }

    document.getElementById("chat-input").focus();
  })
  .catch(function(err) {
    hideTyping();
    setLoading(false);
    showError("网络连接失败，请重试");
    addMessageToUI("assistant", "（网络连接失败，请重试。）");
    document.getElementById("status-text").textContent = "连接失败";
  });
}

function autoResize() {
  var input = document.getElementById("chat-input");
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
}

document.addEventListener("DOMContentLoaded", function() {
  var history = getHistory();
  if (history.length > 0) {
    renderAllMessages();
    updateStatusText();
    removeWelcome();
    var container = document.getElementById("chat-messages");
    container.scrollTop = container.scrollHeight;
  }

  var input = document.getElementById("chat-input");
  input.addEventListener("input", autoResize);
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.focus();
});
</script>

</body>
</html>

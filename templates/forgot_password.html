<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 | Kunigami</title>
  <style>
    body {
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #fff3f8 0%, #ffe9e1 100%);
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; color: #444;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 182, 185, 0.3);
      width: 80%; max-width: 320px; text-align: center;
      border: 1px solid #fff;
    }
    .logo {
      width: 80px; height: 80px; border-radius: 50%;
      margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 { margin: 0 0 20px; font-size: 18px; color: #d81b60; }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    input {
      width: 100%; padding: 12px;
      border: 1px solid #ddd; border-radius: 10px;
      box-sizing: border-box; outline: none; transition: 0.2s;
      font-size: 14px;
    }
    input:focus { border-color: #ffb6b9; background: #fffbfb; }
    input.error { border-color: red !important; background: #fff5f5; }

    .verify-group {
      display: flex; gap: 8px;
    }
    .btn-send {
      width: 100px; padding: 0; flex-shrink: 0;
      background: #f1f3f5; color: #666; font-size: 12px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%; padding: 12px; background: #ffb6b9;
      color: white; border: none; border-radius: 10px;
      font-weight: bold; cursor: pointer; font-size: 15px;
      transition: 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255, 182, 185, 0.4); }
    button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

    .links {
      margin-top: 15px; font-size: 12px; color: #888;
      display: flex; justify-content: center; gap: 15px;
    }
    .links a { color: #d81b60; text-decoration: none; }

    .error-msg { color: red; font-size: 12px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

<div class="login-card">
  <img src="/static/logo.png" class="logo" onerror="this.src='/static/default_avatar.png'">
  <h2>忘记密码</h2>

  <div id="error-msg" class="error-msg"></div>

  <div class="input-group">
    <input type="email" id="email" placeholder="注册邮箱 (Email)">
  </div>

  <div class="input-group verify-group">
    <input type="text" id="verify_code" placeholder="验证码">
    <button class="btn-send" id="btn-send" onclick="sendCode()">去发送</button>
  </div>

  <div class="input-group">
    <input type="password" id="new_password" placeholder="设置新密码 (New Password)">
  </div>

  <button id="btn-submit" onclick="doReset()">确 认</button>

  <div class="links">
    <a href="/login">登录账号</a>
    <a href="/register">立即注册</a>
  </div>
</div>

<script>
  let countdown = 0;

  async function sendCode() {
    const emailInput = document.getElementById('email');
    const email = emailInput.value.trim();
    const errorEl = document.getElementById('error-msg');
    const btnSend = document.getElementById('btn-send');

    if(!email || !email.includes('@')) {
      emailInput.classList.add('error');
      errorEl.textContent = "请输入有效的邮箱地址";
      errorEl.style.color = 'red';
      errorEl.style.display = 'block';
      return;
    }
    emailInput.classList.remove('error');
    errorEl.style.display = 'none';

    btnSend.disabled = true;
    btnSend.textContent = '发送中...';

    try {
      const res = await fetch('/api/forgot_password/send_code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      });
      const result = await res.json();

      if(result.status === 'success') {
        errorEl.textContent = "验证码已发送，请查收邮件";
        errorEl.style.color = '#28a745'; // 绿色提示
        errorEl.style.display = 'block';

        countdown = 60;
        const timer = setInterval(() => {
          btnSend.textContent = countdown + 's';
          countdown--;
          if(countdown < 0) {
            clearInterval(timer);
            btnSend.disabled = false;
            btnSend.textContent = '去发送';
          }
        }, 1000);
      } else {
        emailInput.classList.add('error');
        errorEl.textContent = result.message;
        errorEl.style.color = 'red';
        errorEl.style.display = 'block';
        btnSend.disabled = false;
        btnSend.textContent = '去发送';
      }
    } catch(e) {
      errorEl.textContent = "网络错误";
      errorEl.style.color = 'red';
      errorEl.style.display = 'block';
      btnSend.disabled = false;
      btnSend.textContent = '去发送';
    }
  }

  async function doReset() {
    const emailInput = document.getElementById('email');
    const codeInput = document.getElementById('verify_code');
    const passInput = document.getElementById('new_password');
    const errorEl = document.getElementById('error-msg');
    const btnSubmit = document.getElementById('btn-submit');

    const email = emailInput.value.trim();
    const code = codeInput.value.trim();
    const password = passInput.value.trim();

    if(!email || !code || !password) {
      errorEl.textContent = "请完整填写所有项";
      errorEl.style.display = 'block';
      return;
    }

    emailInput.classList.remove('error');
    codeInput.classList.remove('error');
    errorEl.style.display = 'none';

    btnSubmit.disabled = true;
    btnSubmit.textContent = '提交中...';

    try {
      const res = await fetch('/api/forgot_password/reset', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, code, password })
      });
      const result = await res.json();

      if(result.status === 'success') {
        alert("密码重置成功，请重新登录");
        window.location.href = '/login';
      } else {
        if(result.error_type === 'code') {
          codeInput.classList.add('error');
        } else if(result.error_type === 'email') {
          emailInput.classList.add('error');
        }
        errorEl.textContent = result.message;
        errorEl.style.color = 'red'; // 确保错误提示为红色
        errorEl.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = '确 认';
      }
    } catch(e) {
      errorEl.textContent = "网络错误";
      errorEl.style.display = 'block';
      btnSubmit.disabled = false;
      btnSubmit.textContent = '确 认';
    }
  }
</script>

  <!-- AI巡航悬浮球 -->
  <script src="/static/ai-cruise.js"></script>
</body>
</html>
